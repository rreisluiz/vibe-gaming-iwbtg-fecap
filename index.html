<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glitch Protocol</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            image-rendering: pixelated;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        .glitch-text {
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% {
                transform: translate(0);
                text-shadow: -2px 0 red, 2px 0 blue;
            }

            20% {
                transform: translate(-2px, 2px);
            }

            40% {
                transform: translate(-2px, -2px);
                text-shadow: 2px 0 red, -2px 0 blue;
            }

            60% {
                transform: translate(2px, 2px);
            }

            80% {
                transform: translate(2px, -2px);
            }

            100% {
                transform: translate(0);
            }
        }
    </style>
</head>

<body>
    <div id="ui-overlay">
        <div class="glitch-text">Protocolo: Ativo</div>
        <div id="death-counter">Mortes: 0</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
